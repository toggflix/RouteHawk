program: example-program

targets:
  - https://app.example.com

scope:
  domains:
    - example.com
    - "*.example.com"
  cidrs: []

rules:
  follow_redirects: true
  reject_out_of_scope_redirects: true
  max_rps_per_host: 1
  max_concurrency: 2
  timeout_seconds: 10
  user_agent: "RouteHawk/0.1"
  max_retries: 1
  retry_backoff_seconds: 1.0
  respect_retry_after: true
  request_budget_per_scan: 500

scan:
  passive_first: true
  download_javascript: true
  parse_openapi: true
  parse_robots: true
  parse_sitemap: true
  check_common_metadata: true
  check_auth_behavior: false
  auth_probe_limit: 0

suppression:
  ignore_suffixes:
    - ".bak"
  ignore_path_prefixes:
    - "/noise/"
  ignore_regexes:
    - "/api/internal/cache/\\d+"
