program: example-program

targets:
  - https://app.example.com

scope:
  domains:
    - example.com
    - "*.example.com"
  cidrs: []

rules:
  follow_redirects: true
  reject_out_of_scope_redirects: true
  max_rps_per_host: 2
  max_concurrency: 20
  timeout_seconds: 10
  user_agent: "RouteHawk/0.1"

scan:
  passive_first: true
  download_javascript: true
  parse_openapi: true
  parse_robots: true
  parse_sitemap: true
  check_common_metadata: true
  check_auth_behavior: false
  auth_probe_limit: 20

suppression:
  ignore_suffixes:
    - ".bak"
  ignore_path_prefixes:
    - "/noise/"
  ignore_regexes:
    - "/api/internal/cache/\\d+"
